name: CI/CD Restaurant Booking

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/restaurant-booking:latest
  APP_BASE_URL: ${{ secrets.RAILWAY_APP_URL }}

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: mvn -B clean install

      - name: Run tests
        run: mvn -B test

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: Push Docker image
        run: docker push $IMAGE_NAME

  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Railway
        run: |
          curl -sS -X POST https://api.railway.app/v1/deploy \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "projectId":"${{ secrets.RAILWAY_PROJECT_ID }}",
              "serviceName":"${{ secrets.RAILWAY_SERVICE_NAME }}"
            }'

  healthcheck:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for app startup
        run: sleep 60

      - name: Check health endpoint
        run: |
          HEALTH_URL="${APP_BASE_URL%/}/actuator/health"

          echo "Checking $HEALTH_URL"

          for attempt in {1..20}; do
            status=$(curl --silent --show-error --output response.json --write-out "%{http_code}" "$HEALTH_URL" || true)

            if [ "$status" = "200" ] && grep -q '"status":"UP"' response.json; then
              echo "Service is UP"
              cat response.json
              exit 0
            fi

            echo "Attempt $attempt failed with status $status"
            sleep 10
          done

          echo "Healthcheck failed: $HEALTH_URL"
          cat response.json 2>/dev/null || true
          exit 1