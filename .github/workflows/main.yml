name: CI/CD Restaurant Booking

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  NODE_VERSION: 20
  APP_BASE_URL: ${{ vars.RAILWAY_APP_URL }}

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build project
        run: mvn clean compile

      - name: Run Tests
        run: mvn test
        continue-on-error: true

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/restaurant-booking:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/restaurant-booking:latest

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Railway
        run: |
          curl -X POST https://api.railway.app/v1/deploy \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"projectId":"${{ secrets.RAILWAY_PROJECT_ID }}","serviceName":"${{ secrets.RAILWAY_SERVICE_NAME }}"}'

  healthcheck:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check Health Endpoint
        run: |
          BASE_URL="${APP_BASE_URL:}"
          HEALTH_URL="${BASE_URL%/}/actuator/health"

          echo "Checking ${HEALTH_URL}"

          for attempt in {1..12}; do
            status=$(curl --silent --show-error --output response.json --write-out "%{http_code}" "$HEALTH_URL" || true)

            if [ "$status" = "200" ]; then
              cat response.json
              exit 0
            fi

            echo "Attempt ${attempt}/12 returned HTTP ${status}"
            cat response.json 2>/dev/null || true
            sleep 15
          done

          echo "Healthcheck failed for ${HEALTH_URL}"
          exit 1
