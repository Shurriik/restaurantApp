name: CI/CD Restaurant Booking

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: 20
  APP_BASE_URL: ${{ secrets.RAILWAY_APP_URL }}

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build project
        run: mvn clean install

      - name: Run Tests
        run: mvn test

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/restaurant-booking:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/restaurant-booking:latest

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  healthcheck:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait before healthcheck
        run: sleep 60

      - name: Check Health Endpoint
        run: |
          BASE_URL="${APP_BASE_URL}"
          HEALTH_URL="${BASE_URL%/}/actuator/health"

          echo "Checking ${HEALTH_URL}"

          for attempt in {1..15}; do
            status=$(curl --silent --show-error --output response.json --write-out "%{http_code}" "$HEALTH_URL" || true)

            if [ "$status" = "200" ]; then
              echo "Service is healthy!"
              cat response.json
              exit 0
            fi

            echo "Attempt ${attempt}/15 returned HTTP ${status}"
            sleep 10
          done

          echo "Healthcheck failed for ${HEALTH_URL}"
          exit 1