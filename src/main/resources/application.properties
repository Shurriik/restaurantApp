server.port=${PORT:8080}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.application.name=restaurantApp

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/restaurant_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:221225}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.leak-detection-threshold=10000

spring.mvc.format.date-time=iso

server.tomcat.connection-timeout=12000
server.tomcat.max-connections=5000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=500
server.tomcat.keep-alive-timeout=12000
server.tomcat.max-keep-alive-requests=100

spring.mvc.async.request-timeout=60000

spring.task.execution.pool.core-size=50
spring.task.execution.pool.max-size=100
spring.task.execution.pool.queue-capacity=500
spring.task.execution.pool.keep-alive=60s

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=true

LOG_DIR=${LOG_DIR:./logs}

management.endpoints.web.base-path=/

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

spring.jmx.enabled=false

logging.level.root=WARN